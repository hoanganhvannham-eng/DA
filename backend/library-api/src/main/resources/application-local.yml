spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: BINARY
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: placeholder
            client-secret: placeholder
            scope:
              - email
              - profile
auth:
  email:
    verify-url-template: "http://localhost:5173/verify-email?token=%s"
    reset-url-template: "http://localhost:5173/reset-password?token=%s"
  jwt:
    # HMAC-SHA256 secret — minimum 32 chars (256-bit) for HS256 security.
    # In production: set via environment variable JWT_SECRET (never commit plaintext).
    secret: ${JWT_SECRET:library-starter-dev-secret-key-change-in-production}
    # JWT lifetime: 86400 seconds = 24 hours (BR-01 / API Spec §5.4)
    expiration-seconds: 86400
    issuer: library-api

